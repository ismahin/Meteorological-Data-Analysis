services:
  bmd-nasa-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bmd-nasa-bias-api:latest
    environment:
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://meteorological-data-analysis.vercel.app,http://localhost:5173,http://127.0.0.1:5173}
      MODEL_DIR: /app/models/bias_correction
      BMD_STATIONS_JSON: /app/data/processed/bmd_station_coordinates_35.json
      BMD_TIMESERIES_DIR: /app/data/processed/bmd_stations_3hourly
      NASA_STATION_TIMESERIES_DIR: /app/data/processed/nasa_station_data/3h_picked
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=4).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    depends_on:
      - bmd-nasa-api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
